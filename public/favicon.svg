<?xml version="1.0" encoding="UTF-8"?>
<!--
  Site favicon: "es" wordmark in a rounded square, theme-adaptive.
  Background and text swap on prefers-color-scheme to match the site's
  warm cream / warm dark canvas (matches <meta name="theme-color"> in
  src/components/Head.astro).

  Font is a system stack because favicon SVGs can't reliably load
  @font-face. PNG rasters generated by scripts/build-favicons.mjs use
  whatever the rasterizer's fontconfig resolves (typically Helvetica on
  macOS), which reads close to the site's PP Neue Montreal at favicon
  sizes.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    .bg { fill: #f6f4ef; }
    .fg { fill: #18161a; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #18161a; }
      .fg { fill: #f6f4ef; }
    }
    text {
      font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 700;
      font-size: 44px;
      letter-spacing: -2px;
    }
  </style>
  <rect class="bg" width="64" height="64" rx="12" />
  <text class="fg" x="32" y="48" text-anchor="middle">es</text>
</svg>
