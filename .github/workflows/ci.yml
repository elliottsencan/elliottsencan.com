name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm check

      - name: Astro build
        run: pnpm build

      - name: Link check (internal)
        uses: lycheeverse/lychee-action@v2
        with:
          # --offline skips network calls so flaky third parties don't redden
          # the build; lychee still validates internal hrefs and #fragment
          # anchors against the built dist/. --root-dir lets root-relative
          # hrefs like `/about` resolve to `dist/about/`. Run an online pass
          # on a schedule if/when external link rot becomes a real concern.
          args: --offline --include-fragments --root-dir "${{ github.workspace }}/dist" './dist/**/*.html'
          fail: true

      - name: Worker install
        working-directory: workers/site-ingest
        run: pnpm install --frozen-lockfile

      - name: Worker typecheck
        working-directory: workers/site-ingest
        run: pnpm typecheck

      - name: Worker tests
        working-directory: workers/site-ingest
        run: pnpm test
